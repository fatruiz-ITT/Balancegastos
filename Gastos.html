<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c12">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3061/3061320.png">
    <title>RuizOs Gastos 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600&display=swap');
        :root {
            --bg-dark: #0a0c12;
            --panel-bg: #12151f;
            --accent-cyan: #00f2ff;
            --ok: #00ff9c;
            --text-dim: #64748b;
        }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .sidebar-nav { height: 100vh; background: var(--panel-bg); border-right: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 15px 25px; color: var(--text-dim); cursor: pointer; transition: 0.3s; font-family: 'JetBrains Mono'; font-size: 0.75rem; border-left: 4px solid transparent; }
        .nav-item.active { background: linear-gradient(90deg, rgba(0, 242, 255, 0.08) 0%, transparent 100%); border-left-color: var(--accent-cyan); color: var(--accent-cyan); font-weight: 700; }

        .status-card { background: var(--panel-bg); border: 1px solid #1e293b; border-radius: 16px; padding: 15px; height: 100%; }
        .progress-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .progress-container { background: #080a0f; border-radius: 50px; height: 6px; overflow: hidden; border: 1px solid #1e293b; margin: 8px 0; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        .fill-tasks { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        .fill-money { background: var(--ok); box-shadow: 0 0 10px var(--ok); }

        .paid { text-decoration: line-through; opacity: 0.35; }
        .input-price { background: rgba(255,255,255,0.03); border: 1px solid #334155; color: #fff; border-radius: 6px; padding: 2px 6px; font-family: 'JetBrains Mono'; font-size: 0.75rem; width: 85px; text-align: right; }
        
        .accordion-item { background: transparent; border: 1px solid #1e293b; margin-bottom: 8px; border-radius: 12px !important; overflow: hidden; }
        .accordion-button { background: transparent !important; color: #fff !important; padding: 12px 15px; box-shadow: none !important; }
        .accordion-button::after { filter: invert(1); }

        /* Estilo Recíproco */
        .reciproco-row { background: rgba(0, 242, 255, 0.02) !important; }
        .reciproco-text { padding-left: 1.5rem !important; color: var(--text-dim) !important; font-size: 0.7rem !important; }

        @media (max-width: 768px) {
            .sidebar-nav { display: none; }
            .mobile-header { display: block; background: var(--panel-bg); padding: 15px; border-bottom: 1px solid #1e293b; position: sticky; top:0; z-index: 1000; }
            .month-selector-mobile { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; scrollbar-width: none; }
            .m-pill { padding: 6px 15px; border-radius: 20px; border: 1px solid #1e293b; font-size: 0.7rem; white-space: nowrap; color: var(--text-dim); }
            .m-pill.active { background: var(--accent-cyan); color: #000; font-weight: 800; border-color: var(--accent-cyan); }
        }
        .mobile-header { display: none; }
        
        /* MOBILE HEADER FIX */
        .mobile-header { 
            display: none; 
        }

        @media (max-width: 768px) {
            .sidebar-nav { display: none !important; }
            
            .mobile-header { 
                display: block !important; 
                background: var(--panel-bg); 
                padding: 15px; 
                border-bottom: 1px solid #1e293b; 
                position: sticky; 
                top: 0; 
                z-index: 2000; /* Asegura que esté por encima de todo */
            }

            .month-selector-mobile { 
                display: flex; 
                flex-wrap: nowrap;
                overflow-x: auto; 
                gap: 10px; 
                padding: 10px 0; 
                -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
            }

            /* Ocultar barra de scroll pero permitir scroll */
            .month-selector-mobile::-webkit-scrollbar { display: none; }
            .month-selector-mobile { -ms-overflow-style: none; scrollbar-width: none; }

            .m-pill { 
                padding: 8px 18px; 
                border-radius: 20px; 
                border: 1px solid #1e293b; 
                font-size: 0.7rem; 
                white-space: nowrap; 
                color: var(--text-dim);
                background: rgba(255,255,255,0.02);
            }

            .m-pill.active { 
                background: var(--accent-cyan); 
                color: #000; 
                font-weight: 800; 
                border-color: var(--accent-cyan);
                box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            }
        }
    </style>
</head>
<body>

<div class="mobile-header">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="fw-bold">RUÍZ<span style="color:var(--accent-cyan)">.OS</span></div>
        <button class="btn btn-sm btn-info fw-bold" onclick="save()">SINC_DATA</button>
    </div>
    <div class="month-selector-mobile" id="month-list-mobile"></div>
</div>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar-nav text-center">
            <div class="p-4 border-bottom border-dark">
                <div class="h5 mb-0 fw-bold">RUÍZ<span style="color:var(--accent-cyan)">.OS</span></div>
                <small class="text-dim">v8.3 Pro</small>
            </div>
            <div id="month-list-desktop"></div>
        </div>

        <div class="col-md-10 p-lg-5 p-3">
            <div class="row align-items-end mb-4">
                <div class="col-md-7">
                    <h1 class="fw-bold" id="title-mes">---</h1>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="progress-label">Items Apartados</div>
                            <div class="progress-container"><div class="progress-fill fill-tasks" id="prog-t"></div></div>
                            <div class="ok small fw-bold" id="prog-t-text">0%</div>
                        </div>
                        <div class="col-6">
                            <div class="progress-label">Pagado / Liquidado</div>
                            <div class="progress-container"><div class="progress-fill fill-money" id="prog-m"></div></div>
                            <div class="ok small fw-bold" id="prog-m-text">0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-5 text-md-end d-none d-md-block">
                    <button class="btn btn-info fw-bold px-4" onclick="save()">SINC_SYSTEM_DATA</button>
                </div>
            </div>

            <div class="row mb-4 g-2">
    <div class="col-6 col-md-4">
        <div class="status-card" style="border-left: 3px solid var(--accent-cyan)">
            <div class="progress-label">Q1: Disponible</div>
            <div class="h2 fw-bold mb-0" id="kpi-q1-libre" style="color: var(--ok)">$0</div>
            <div class="d-flex justify-content-between border-top border-dark mt-1 pt-1">
                <small class="text-dim">Gastos:</small>
                <small class="text-danger fw-bold" id="kpi-q1-gastos">$0</small>
            </div>
        </div>
    </div>
    
    <div class="col-6 col-md-4">
        <div class="status-card" style="border-left: 3px solid #ffc107">
            <div class="progress-label">Q2: Disponible</div>
            <div class="h2 fw-bold mb-0" id="kpi-q2-libre" style="color: var(--ok)">$0</div>
            <div class="d-flex justify-content-between border-top border-dark mt-1 pt-1">
                <small class="text-dim">Gastos:</small>
                <small class="text-danger fw-bold" id="kpi-q2-gastos">$0</small>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-4">
        <div class="status-card" style="border-left: 3px solid var(--ok)">
            <div class="progress-label">Fondo Total Acumulado</div>
            <div class="h2 fw-bold mb-0" id="kpi-ahorro-global" style="color: #fff">$0</div>
            <div class="d-flex justify-content-between border-top border-dark mt-1 pt-1 align-items-center">
                <small class="text-dim">Retiro Mes:</small>
                <input type="number" id="gasto-ahorro" class="input-price" 
                       style="width: 70px; height: 20px; font-size: 0.65rem;" 
                       onchange="updateRetiroMes(this.value)" placeholder="0">
            </div>
        </div>
    </div>
</div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="p-3 mb-3 border-start border-info border-4 bg-dark"><h6 class="fw-bold mb-0">QUINCENA ALPHA</h6><small class="text-dim" id="date-q1"></small></div>
                    <div class="accordion" id="accQ1"></div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="p-3 mb-3 border-start border-warning border-4 bg-dark"><h6 class="fw-bold mb-0">QUINCENA OMEGA</h6><small class="text-dim" id="date-q2"></small></div>
                    <div class="accordion" id="accQ2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const calendarioNomina = {
    "Abril": { q1: "01 Abr", q2: "17 Abr" }, "Mayo": { q1: "30 Abr", q2: "15 May" }, "Junio": { q1: "29 May", q2: "12 Jun" },
    "Julio": { q1: "26 Jun", q2: "10 Jul" }, "Agosto": { q1: "24 Jul", q2: "07 Ago" }, "Septiembre": { q1: "21 Ago", q2: "04 Sep" },
    "Octubre": { q1: "18 Sep", q2: "01 Oct" }, "Noviembre": { q1: "16 Oct", q2: "30 Oct" }, "Diciembre": { q1: "13 Nov", q2: "25 Nov" }
};

let mesActual = "Abril";
let appData = JSON.parse(localStorage.getItem('finanzas_v8_3')) || {};

const plantillaMaestra = {
    q1: [
        { id: "q1r", cat: "🏠 Vivienda", icon: "fa-house", items: [{n: "Renta Casa", v: 4000, op: false, p: false, b: ""}, {n: "Luz", v: 500, op: false, p: false, b: ""}] },
        { id: "q1s", cat: "💊 Salud Familiar", icon: "fa-kit-medical", items: [{n: "Tiras azúcar", v: 350, op: false, p: false, b: ""}, {n: "Metformina", v: 50, op: false, p: false, b: ""}, {n: "Colitis", v: 200, op: false, p: false, b: ""}, {n: "Medicina Extra", v: 250, op: false, p: false, b: ""}] },
        { id: "q1v", cat: "🔧 Servicios", icon: "fa-server", items: [{n: "Saldo Semana-1", v: 100, op: false, p: false, b: ""}, {n: "Saldo Semana-2", v: 100, op: false, p: false, b: ""}, {n: "Saldo Semana-3", v: 100, op: false, p: false, b: ""}, {n: "Revolut Premium", v: 180, op: false, p: false, b: ""}] },
        { id: "q1e", cat: "🎬 Ocio", icon: "fa-play", items: [{n: "Netflix", v: 249, op: false, p: false, b: ""}, {n: "YouTube", v: 159, op: false, p: false, b: ""}, {n: "Crunchyroll", v: 159, op: false, p: false, b: ""}, {n: "Disney", v: 249, op: false, p: false, b: ""}, {n: "WPS Office", v: 125, op: false, p: false, b: ""}, {n: "Google One", v: 39, op: false, p: false, b: ""}] },
        { id: "q1p", cat: "🐾 Patas", icon: "fa-paw", items: [{n: "Arena Gato", v: 500, op: false, p: false, b: ""}, {n: "Sobres Patas", v: 1000, op: false, p: false, b: ""}] },
        { id: "q1a", cat: "💰 Ahorro", icon: "fa-piggy-bank", items: [{n: "Ahorro Personal", v: 1000, op: false, p: false, b: ""}, {n: "Compra de BTC", v: 1000, op: false, p: false, b: ""}] }
    ],
    q2: [ { id: "q2r", cat: "🏠 Vivienda", icon: "fa-house", items: [{n: "Renta Casa", v: 4000, op: false, p: false, b: ""}, {n: "Luz", v: 500, op: false, p: false, b: ""}] }, { id: "q2m", cat: "💊 Salud Familiar", icon: "fa-heart-pulse", items: [ {n: "Tiras azúcar", v: 350, op: false, p: false, b: ""}, {n: "Metformina", v: 50, op: false, p: false, b: ""}, {n: "Medicina Extra", v: 200, op: false, p: false, b: ""}, {n: "↳ Omega 3", v: 298, op: false, p: false, b: ""}, {n: "↳ NAD + Resv", v: 498, op: false, p: false, b: ""}, {n: "↳ Magnesio", v: 298, op: false, p: false, b: ""}, {n: "↳ Centrum Multi", v: 303, op: false, p: false, b: ""}, {n: "↳ Cardo Mariano", v: 298, op: false, p: false, b: ""}, {n: "↳ Betabel Comp", v: 237, op: false, p: false, b: ""} ]}, { id: "q2v", cat: "🔧 Conectividad", icon: "fa-wifi", items: [{n: "Telnor", v: 349, op: false, p: false, b: ""}, {n: "Izzy", v: 330, op: false, p: false, b: ""}, {n: "At&t Plan", v: 629, op: false, p: false, b: ""}, {n: "Uber Seguro", v: 600, op: false, p: false, b: ""}, {n: "Agua", v: 250, op: false, p: false, b: ""}, {n: "Gas", v: 200, op: false, p: false, b: ""}, {n: "Saldo S4", v: 100, op: false, p: false, b: ""}] }, { id: "q2e", cat: "🎬 Ocio", icon: "fa-music", items: [{n: "Amazon Prime", v: 150, op: false, p: false, b: ""}, {n: "Spotify", v: 139, op: false, p: false, b: ""}] }, { id: "q2p", cat: "🐾 Patas", icon: "fa-cat", items: [{n: "Croquetas", v: 400, op: false, p: false, b: ""}, {n: "Sobres Patas", v: 1050, op: false, p: false, b: ""}] }, { id: "q2l", cat: "🧹 Limpieza", icon: "fa-broom", items: [{n: "Surtido Limpieza", v: 1200, op: false, p: false, b: ""}] }, { id: "q2a", cat: "💰 Ahorro", icon: "fa-piggy-bank", items: [{n: "Ahorro Personal", v: 1000, op: false, p: false, b: ""}] } ], ingreso: 15000, bonos: 3200, retiroAhorro: 0 
};

function init() {
    const listD = document.getElementById('month-list-desktop');
    const listM = document.getElementById('month-list-mobile');
    listD.innerHTML = ''; listM.innerHTML = '';
    Object.keys(calendarioNomina).forEach(m => {
        const div = document.createElement('div');
        div.className = `nav-item ${m === mesActual ? 'active' : ''}`;
        div.innerHTML = m.toUpperCase();
        div.onclick = () => { mesActual = m; init(); };
        listD.appendChild(div);
        const pill = document.createElement('div');
        pill.className = `m-pill ${m === mesActual ? 'active' : ''}`;
        pill.innerHTML = m.toUpperCase();
        pill.onclick = () => { mesActual = m; init(); };
        listM.appendChild(pill);
        if (!appData[m]) appData[m] = JSON.parse(JSON.stringify(plantillaMaestra));
    });
    render();
}

function render() {
    document.getElementById('title-mes').innerText = mesActual.toUpperCase();
    const data = appData[mesActual];
    const fechas = calendarioNomina[mesActual];
    document.getElementById('date-q1').innerText = `PAGO: ${fechas.q1}`;
    document.getElementById('date-q2').innerText = `PAGO: ${fechas.q2}`;

    ['q1', 'q2'].forEach(q => {
        const container = document.getElementById(q === 'q1' ? 'accQ1' : 'accQ2');
        container.innerHTML = '';
        data[q].forEach((sec, sIdx) => {
            let totalSec = sec.items.reduce((a, b) => a + b.v, 0);
            container.innerHTML += `
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#c-${sec.id}">
                            <div class="d-flex justify-content-between w-100 pe-3 align-items-center">
                                <span><i class="fa-solid ${sec.icon} me-3 opacity-50"></i>${sec.cat}</span>
                                <span class="badge bg-dark text-info border border-info border-opacity-25">$${totalSec.toLocaleString()}</span>
                            </div>
                        </button>
                    </h2>
                    <div id="c-${sec.id}" class="accordion-collapse collapse">
                        <div class="table-responsive">
                            <table class="table table-dark table-borderless mb-0" style="font-size: 0.75rem;">
                                <thead><tr class="text-dim">
                                    <th class="ps-4">Apartado</th>
                                    <th>Concepto</th>
                                    <th class="text-center pe-4">Monto</th>
                                    <th>Pagado</th>
                                </tr></thead>
                                <tbody>
                                ${sec.items.map((it, iIdx) => {
                                    const isRec = it.n.includes('↳');
                                    return `
                                    <tr id="row-${q}-${sIdx}-${iIdx}" class="${it.p ? 'paid' : ''} ${isRec ? 'reciproco-row' : ''}">
                                        <td class="ps-4"><input type="checkbox" class="form-check-input chk-op" style="accent-color: var(--accent-cyan)" ${it.op?'checked':''} onclick="toggle(event, '${q}',${sIdx},${iIdx},'op')"></td>
                                        <td class="py-2 ${isRec ? 'reciproco-text' : ''}">${it.n}</td>
                                        <td class="text-center pe-4"><input type="number" class="input-price" value="${it.v}" onclick="event.stopPropagation()" onchange="updateVal('${q}',${sIdx},${iIdx},'v',this.value)"></td>
                                        <td><input type="checkbox" class="form-check-input chk-pay" style="accent-color: var(--ok)" ${it.p?'checked':''} onclick="toggle(event, '${q}',${sIdx},${iIdx},'p')"></td>
                                    </tr>`;
                                }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
        });
    });
    updateTopStats();
}

function toggle(event, q, sIdx, iIdx, type) {
    event.stopPropagation();
    const item = appData[mesActual][q][sIdx].items[iIdx];
    item[type] = !item[type];
    const row = document.getElementById(`row-${q}-${sIdx}-${iIdx}`);
    if (item.p) row.classList.add('paid'); else row.classList.remove('paid');
    updateTopStats();
}

function updateVal(q, sIdx, iIdx, key, val) {
    appData[mesActual][q][sIdx].items[iIdx][key] = (key === 'v') ? parseFloat(val) || 0 : val;
    updateTopStats();
}

function updateTopStats() {
    const data = appData[mesActual];
    let q1G = 0, q2G = 0, pT = 0, iT = 0, oT = 0;
    ['q1', 'q2'].forEach(q => {
        data[q].forEach(s => s.items.forEach(it => {
            iT++; if (q === 'q1') q1G += it.v; else q2G += it.v;
            if (it.op) oT++; if (it.p) pT += it.v;
        }));
    });
    const tieneB = mesActual === "Mayo" || data.q2.some(s => s.cat.includes("Limpieza"));
    const iQ2 = data.ingreso + (tieneB ? data.bonos : 0);
    document.getElementById('kpi-q1-libre').innerText = `$${(data.ingreso - q1G).toLocaleString()}`;
    document.getElementById('kpi-q1-gastos').innerText = `$${q1G.toLocaleString()}`;
    document.getElementById('kpi-q2-libre').innerText = `$${(iQ2 - q2G).toLocaleString()}`;
    document.getElementById('kpi-q2-gastos').innerText = `$${q2G.toLocaleString()}`;
    
    let global = 0;
    Object.keys(appData).forEach(m => {
        let ah = 0;
        ['q1','q2'].forEach(q => { if(appData[m][q]) appData[m][q].forEach(s => s.items.forEach(it => { if(it.p && s.cat.includes("Ahorro")) ah += it.v; }))});
        global += (ah - (appData[m].retiroAhorro || 0));
    });
    document.getElementById('kpi-ahorro-global').innerText = `$${global.toLocaleString()}`;

    let pOps = Math.round((oT / iT) * 100) || 0;
    document.getElementById('prog-t').style.width = pOps + '%';
    document.getElementById('prog-t-text').innerText = `${pOps}% (${oT}/${iT})`;
    let pPay = Math.round((pT / (q1G + q2G)) * 100) || 0;
    document.getElementById('prog-m').style.width = pPay + '%';
    document.getElementById('prog-m-text').innerText = `${pPay}% ($${pT.toLocaleString()})`;
}

function updateRetiroMes(v) { appData[mesActual].retiroAhorro = parseFloat(v) || 0; updateTopStats(); }
function save() { localStorage.setItem('finanzas_v8_3', JSON.stringify(appData)); alert("SYSTEM_SYNC: OK."); }
init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
