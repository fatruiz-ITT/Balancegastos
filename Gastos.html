<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuizOs | FINANCES 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600&display=swap');
        :root {
            --bg-dark: #0a0c12;
            --panel-bg: #12151f;
            --accent-cyan: #00f2ff;
            --risk: #ff4d4d;
            --ok: #00ff9c;
            --text-dim: #64748b;
        }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .sidebar-nav { height: 100vh; background: var(--panel-bg); border-right: 1px solid #1e293b; position: sticky; top: 0; overflow-y: auto; z-index: 100; }
        .nav-item {
            padding: 15px 25px; color: var(--text-dim); cursor: pointer; transition: 0.3s;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; border-left: 4px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.02); color: #fff; }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.08) 0%, transparent 100%);
            border-left-color: var(--accent-cyan); color: var(--accent-cyan); font-weight: 700;
        }

        .status-card { background: var(--panel-bg); border: 1px solid #1e293b; border-radius: 16px; padding: 20px; height: 100%; }
        .risk { color: var(--risk); }
        .ok { color: var(--ok); }
        
        .progress-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .progress-container { background: #080a0f; border-radius: 50px; height: 8px; overflow: hidden; border: 1px solid #1e293b; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        .fill-tasks { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        .fill-money { background: var(--ok); box-shadow: 0 0 10px var(--ok); }

        .paid { text-decoration: line-through; opacity: 0.35; }
        .input-price {
            background: transparent; border: 1px solid #334155; color: #fff;
            border-radius: 6px; padding: 2px 8px; width: 85px; text-align: right; font-family: 'JetBrains Mono';
        }
        .input-price:focus { border-color: var(--accent-cyan); outline: none; background: rgba(0, 242, 255, 0.05); }

        .accordion-item { background: transparent; border: 1px solid #1e293b; margin-bottom: 8px; border-radius: 12px !important; overflow: hidden; }
        .accordion-button { background: transparent !important; color: #fff !important; box-shadow: none !important; }
        .accordion-button::after { filter: invert(1); }
        
        .form-check-input { cursor: pointer; background-color: #1e293b; border-color: #334155; }
        .form-check-input:checked { background-color: var(--ok); border-color: var(--ok); }

        .btn-update {
            background: var(--accent-cyan); color: #000; font-weight: 800; border-radius: 8px;
            padding: 12px 24px; border: none; transition: 0.3s;
        }
        .btn-update:hover { transform: translateY(-2px); filter: brightness(1.1); }

        @media (max-width: 768px) { 
            .sidebar-nav { height: auto; flex-direction: row; display: flex; overflow-x: auto; position: relative; }
            .nav-item { white-space: nowrap; padding: 10px 15px; }
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar-nav">
            <div class="p-4 border-bottom border-dark text-center d-none d-md-block">
                <div class="h5 mb-0 fw-bold">RUÍZ<span style="color:var(--accent-cyan)">.OS</span></div>
                <small class="text-dim">v7.2 Stable</small>
            </div>
            <div id="month-list"></div>
        </div>

        <div class="col-md-10 p-lg-5 p-4">
            <div class="row align-items-center mb-5">
                <div class="col-md-7">
                    <h1 class="fw-bold mb-3" id="title-mes">---</h1>
                    <div class="row g-4">
                        <div class="col-md-5">
                            <div class="progress-label">Checklist de Operaciones</div>
                            <div class="progress-container"><div class="progress-fill fill-tasks" id="prog-t"></div></div>
                            <div class="ok small fw-bold mt-1" id="prog-t-text">0%</div>
                        </div>
                        <div class="col-md-5">
                            <div class="progress-label">Flujo de Capital Pagado</div>
                            <div class="progress-container"><div class="progress-fill fill-money" id="prog-m"></div></div>
                            <div class="ok small fw-bold mt-1" id="prog-m-text">0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-5 text-md-end mt-4 mt-md-0">
                    <button class="btn-update" onclick="save()">SINC_SYSTEM_DATA</button>
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-md-4 mb-3">
                    <div class="status-card" style="border-left: 4px solid var(--accent-cyan)">
                        <div class="progress-label">Q1: Para Despensa</div>
                        <div class="h2 fw-bold ok" id="kpi-q1-libre">$0</div>
                        <div class="d-flex justify-content-between mt-2 border-top border-dark pt-2">
                            <small class="text-dim">Egresos Q1:</small>
                            <small class="risk fw-bold" id="kpi-q1-gastos">$0</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="status-card" style="border-left: 4px solid #ffc107">
                        <div class="progress-label">Q2: Para Despensa</div>
                        <div class="h2 fw-bold ok" id="kpi-q2-libre">$0</div>
                        <div class="d-flex justify-content-between mt-2 border-top border-dark pt-2">
                            <small class="text-dim">Egresos Q2:</small>
                            <small class="risk fw-bold" id="kpi-q2-gastos">$0</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="status-card" style="border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.03);">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="progress-label" style="color: var(--accent-cyan)">Fondo Total Acumulado</div>
                                <div class="h2 fw-bold mb-0" id="kpi-ahorro-global">$0</div>
                            </div>
                            <div class="text-end">
                                <div class="progress-label">Retiro <span id="mes-label-retiro">...</span></div>
                                <input type="number" id="gasto-ahorro" class="input-price" 
                                       style="width: 90px; color: var(--risk); border-color: rgba(255, 77, 77, 0.3);" 
                                       placeholder="$ 0" onchange="updateRetiroMes(this.value)">
                            </div>
                        </div>
                        <div class="mt-2 pt-2 border-top border-dark d-flex justify-content-between">
                            <small class="text-dim">Ahorro real este mes:</small>
                            <small class="ok fw-bold" id="kpi-ahorro-mes">$0</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="p-3 mb-3 border-start border-info border-4 bg-dark">
                        <h6 class="fw-bold mb-0">QUINCENA ALPHA</h6>
                        <small class="text-dim" id="date-q1"></small>
                    </div>
                    <div class="accordion" id="accQ1"></div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="p-3 mb-3 border-start border-warning border-4 bg-dark">
                        <h6 class="fw-bold mb-0">QUINCENA OMEGA</h6>
                        <small class="text-dim" id="date-q2"></small>
                    </div>
                    <div class="accordion" id="accQ2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const calendarioNomina = {
    "Abril": { q1: "01 Abr", q2: "17 Abr" },
    "Mayo": { q1: "30 Abr", q2: "15 May" },
    "Junio": { q1: "29 May", q2: "12 Jun" },
    "Julio": { q1: "26 Jun", q2: "10 Jul" },
    "Agosto": { q1: "24 Jul", q2: "07 Ago" },
    "Septiembre": { q1: "21 Ago", q2: "04 Sep" },
    "Octubre": { q1: "18 Sep", q2: "01 Oct" },
    "Noviembre": { q1: "16 Oct", q2: "30 Oct" },
    "Diciembre": { q1: "13 Nov", q2: "25 Nov" }
};

let mesActual = "Abril";
let appData = JSON.parse(localStorage.getItem('finanzas_v7_2')) || {};

const plantillaMaestra = {
    q1: [
        { id: "q1r", cat: "🏠 Vivienda", icon: "fa-house", items: [{n: "Renta Casa", v: 4000, p: false}, {n: "Luz", v: 500, p: false}] },
        { id: "q1s", cat: "💊 Salud", icon: "fa-kit-medical", items: [{n: "Tiras azúcar", v: 350, p: false}, {n: "Metformina", v: 50, p: false}, {n: "Colitis", v: 200, p: false}, {n: "Medicina Extra", v: 250, p: false}] },
        { id: "q1v", cat: "🔧 Servicios", icon: "fa-server", items: [{n: "Saldo Mamá Semana1", v: 100, p: false}, {n: "Saldo Mamá Semana2", v: 100, p: false}, {n: "Saldo Mamá Semana3", v: 100, p: false}, {n: "Revolut Premium", v: 180, p: false}] },
        { id: "q1e", cat: "🎬 Ocio", icon: "fa-play", items: [{n: "Netflix", v: 249, p: false}, {n: "YouTube", v: 159, p: false}, {n: "Crunchyroll", v: 159, p: false}, {n: "Disney", v: 249, p: false}, {n: "WPS Office", v: 125, p: false}, {n: "Google One", v: 39, p: false}] },
        { id: "q1p", cat: "🐾 Patas", icon: "fa-paw", items: [{n: "Arena Gato", v: 500, p: false}, {n: "Sobres Patas", v: 1000, p: false}] },
        { id: "q1a", cat: "💰 Ahorro", icon: "fa-piggy-bank", items: [{n: "Ahorro Personal", v: 1000, p: false},{n: "Bitcoin Compra", v: 1000, p: false}] }
    ],
    q2: [
        { id: "q2r", cat: "🏠 Vivienda", icon: "fa-house", items: [{n: "Renta Casa", v: 4000, p: false}, {n: "Luz", v: 500, p: false}] },
        { id: "q2m", cat: "💊 Salud Familiar", icon: "fa-heart-pulse", items: [
            {n: "Tiras azúcar", v: 350, p: false}, {n: "Metformina", v: 50, p: false}, {n: "Medicina Extra", v: 200, p: false},
            {n: "↳ Omega 3", v: 298, p: false}, {n: "↳ NAD + Resveratrol", v: 498, p: false}, {n: "↳ Magnesio", v: 298, p: false},
            {n: "↳ Cetrum Multivitaminico", v: 303, p: false}, {n: "↳ Cardio Mariano + NAC", v: 298, p: false}, {n: "↳ Betabel Complex", v: 237, p: false}
        ]},
        { id: "q2v", cat: "🔧 Conectividad", icon: "fa-wifi", items: [{n: "Telnor", v: 349, p: false}, {n: "Izzy", v: 330, p: false}, {n: "At&t Plan", v: 629, p: false}, {n: "Uber Seguro", v: 600, p: false}, {n: "Agua", v: 250, p: false}, {n: "Gas", v: 200, p: false}, {n: "Saldo Mamá S4", v: 100, p: false}] },
        { id: "q2e", cat: "🎬 Entretenimiento", icon: "fa-music", items: [{n: "Amazon Prime", v: 150, p: false}, {n: "Spotify", v: 139, p: false}] },
        { id: "q2p", cat: "🐾 Patas", icon: "fa-cat", items: [{n: "Croquetas", v: 400, p: false}, {n: "Sobres Patas", v: 1050, p: false}] },
        { id: "q2l", cat: "🧹 Limpieza", icon: "fa-broom", items: [{n: "Surtido Limpieza", v: 1200, p: false}] },
        { id: "q2a", cat: "💰 Ahorro", icon: "fa-piggy-bank", items: [{n: "Ahorro Personal", v: 1000, p: false}] }
    ],
    pagoQuincenal: 15000,
    bonos: 3200,
    retiroAhorro: 0
};

function init() {
    const list = document.getElementById('month-list');
    list.innerHTML = '';
    Object.keys(calendarioNomina).forEach(m => {
        const div = document.createElement('div');
        div.className = `nav-item ${m === mesActual ? 'active' : ''}`;
        div.innerHTML = m.toUpperCase();
        div.onclick = () => { 
            mesActual = m; 
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); 
            div.classList.add('active'); 
            render(); 
        };
        list.appendChild(div);
        if (!appData[m]) appData[m] = JSON.parse(JSON.stringify(plantillaMaestra));
    });
    render();
}

function render() {
    document.getElementById('title-mes').innerText = mesActual.toUpperCase();
    const data = appData[mesActual];
    const fechas = calendarioNomina[mesActual];

    document.getElementById('date-q1').innerText = `PAGO ESTIMADO: ${fechas.q1}`;
    document.getElementById('date-q2').innerText = `PAGO ESTIMADO: ${fechas.q2}`;

    ['q1', 'q2'].forEach(q => {
        const container = document.getElementById(q === 'q1' ? 'accQ1' : 'accQ2');
        container.innerHTML = '';
        data[q].forEach((sec, sIdx) => {
            let totalSec = sec.items.reduce((a, b) => a + b.v, 0);
            const accordionHtml = `
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#c-${sec.id}">
                            <div class="d-flex justify-content-between w-100 pe-3 align-items-center">
                                <span><i class="fa-solid ${sec.icon} me-3 opacity-50"></i>${sec.cat}</span>
                                <span class="badge bg-dark text-info border border-info border-opacity-25">$${totalSec.toLocaleString()}</span>
                            </div>
                        </button>
                    </h2>
                    <div id="c-${sec.id}" class="accordion-collapse collapse">
                        <div class="accordion-body p-0 pt-2">
                            <table class="table table-dark table-borderless mb-0">
                                ${sec.items.map((it, iIdx) => {
                                    const isSub = it.n.includes("↳");
                                    const rowId = `row-${q}-${sIdx}-${iIdx}`;
                                    return `
                                    <tr id="${rowId}" class="${it.p ? 'paid' : ''}">
                                        <td width="40" class="ps-4">
                                            <input type="checkbox" class="form-check-input" ${it.p?'checked':''} 
                                                onclick="quickToggle('${q}', ${sIdx}, ${iIdx}, '${rowId}')">
                                        </td>
                                        <td class="py-2 ${isSub ? 'ps-5 opacity-75 small' : ''}">${it.n}</td>
                                        <td class="text-end pe-4">
                                            <input type="number" class="input-price" value="${it.v}" 
                                                onchange="updateVal('${q}', ${sIdx}, ${iIdx}, this.value)">
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </table>
                        </div>
                    </div>
                </div>`;
            container.innerHTML += accordionHtml;
        });
    });
    updateTopStats();
}

function updateVal(q, sIdx, iIdx, v) {
    appData[mesActual][q][sIdx].items[iIdx].v = parseFloat(v) || 0;
    updateTopStats();
}

function quickToggle(q, sIdx, iIdx, rowId) {
    const item = appData[mesActual][q][sIdx].items[iIdx];
    item.p = !item.p;
    const row = document.getElementById(rowId);
    if (item.p) row.classList.add('paid');
    else row.classList.remove('paid');
    updateTopStats();
}

function updateTopStats() {
    let globalAhorro = 0;
    let mesAhorroCheck = 0;
    let q1Gasto = 0, q2Gasto = 0;
    let qPagadoMes = 0, qTotalMesGasto = 0;
    let itemsTotalMes = 0, itemsCheckMes = 0;

    Object.keys(appData).forEach(m => {
        let ahorroMesLoop = 0;
        let retiroMesLoop = appData[m].retiroAhorro || 0;
        
        ['q1', 'q2'].forEach(q => {
            appData[m][q].forEach(sec => {
                sec.items.forEach(it => {
                    if (it.p && sec.cat.includes("Ahorro")) ahorroMesLoop += it.v;
                    if (m === mesActual) {
                        itemsTotalMes++;
                        if (q === 'q1') q1Gasto += it.v; else q2Gasto += it.v;
                        if (it.p) { itemsCheckMes++; qPagadoMes += it.v; }
                    }
                });
            });
        });
        globalAhorro += (ahorroMesLoop - retiroMesLoop);
        if (m === mesActual) mesAhorroCheck = ahorroMesLoop;
    });

    const dataActual = appData[mesActual];
    qTotalMesGasto = q1Gasto + q2Gasto;

    document.getElementById('mes-label-retiro').innerText = mesActual;
    document.getElementById('gasto-ahorro').value = dataActual.retiroAhorro || "";
    document.getElementById('kpi-ahorro-global').innerText = `$${globalAhorro.toLocaleString()}`;
    document.getElementById('kpi-ahorro-mes').innerText = `$${mesAhorroCheck.toLocaleString()}`;

    const tieneBonos = mesActual === "Mayo" || dataActual.q2.some(s => s.cat.includes("Limpieza"));
    const ingresoQ2 = dataActual.pagoQuincenal + (tieneBonos ? dataActual.bonos : 0);

    // Actualización de KPIs Quincenales
    document.getElementById('kpi-q1-libre').innerText = `$${(dataActual.pagoQuincenal - q1Gasto).toLocaleString()}`;
    document.getElementById('kpi-q1-gastos').innerText = `$${q1Gasto.toLocaleString()}`;
    
    document.getElementById('kpi-q2-libre').innerText = `$${(ingresoQ2 - q2Gasto).toLocaleString()}`;
    document.getElementById('kpi-q2-gastos').innerText = `$${q2Gasto.toLocaleString()}`;

    // Barras de Progreso
    let pT = Math.round((itemsCheckMes / itemsTotalMes) * 100) || 0;
    document.getElementById('prog-t').style.width = pT + '%';
    document.getElementById('prog-t-text').innerText = `${pT}% (${itemsCheckMes}/${itemsTotalMes})`;

    let pM = Math.round((qPagadoMes / qTotalMesGasto) * 100) || 0;
    document.getElementById('prog-m').style.width = pM + '%';
    document.getElementById('prog-m-text').innerText = `${pM}% ($${qPagadoMes.toLocaleString()})`;
}

function updateRetiroMes(valor) {
    appData[mesActual].retiroAhorro = parseFloat(valor) || 0;
    updateTopStats();
}

function save() {
    localStorage.setItem('finanzas_v7_2', JSON.stringify(appData));
    alert("KERNEL: Sincronización local exitosa.");
}

init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
